services:
  - type: web
    name: taskman-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # Set manually on Render dashboard (Supabase URL)
      - key: ALLOWED_ORIGINS
        sync: false        # Set manually — Vercel frontend URL